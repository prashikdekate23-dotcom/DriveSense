<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DriveSense | Smart Automotive Dashboard</title>

<link rel="stylesheet" href="assets/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

🚗 DriveSense

</div>

<div id="clock">

00:00:00

</div>

</header>

<main class="dashboard">

<!-- SPEED -->

<section class="card">

<h2>Speed</h2>

<div class="gauge">

<div id="speed" class="value">0</div>

<span>km/h</span>

</div>

</section>

<!-- RPM -->

<section class="card">

<h2>RPM</h2>

<div class="gauge">

<div id="rpm" class="value">900</div>

<span>rpm</span>

</div>

</section>

<!-- FUEL -->

<section class="card">

<h2>Fuel Level</h2>

<div class="progress">

<div id="fuelBar"></div>

</div>

<p id="fuelText">100%</p>

</section>

<!-- TEMPERATURE -->

<section class="card">

<h2>Engine Temperature</h2>

<div class="progress">

<div id="tempBar" class="red"></div>

</div>

<p id="tempText">90 °C</p>

</section>

<!-- BATTERY -->

<section class="card">

<h2>Battery</h2>

<div class="battery" id="battery">

12.6 V

</div>

</section>

<!-- ODOMETER -->

<section class="card">

<h2>Odometer</h2>

<div class="battery" id="odometer">

12548 km

</div>

</section>

<!-- INDICATORS -->

<section class="card">

<h2>Vehicle Status</h2>

<div class="statusGrid">

<div class="status active" id="left">

⬅ Left

</div>

<div class="status" id="right">

Right ➡

</div>

<div class="status active" id="headlight">

💡 Headlight

</div>

<div class="status" id="seatbelt">

🪑 Seat Belt

</div>

</div>

</section>

<!-- WARNING -->

<section class="card">

<h2>System Warning</h2>

<div id="warning">

✅ All Systems Normal

</div>

</section>

</main>

<footer>

Designed & Developed by <strong>Prashik Dekate</strong>

</footer>

<script src="assets/js/script.js"></script>

</body>

</html>
